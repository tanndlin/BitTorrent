services:
  bittorrent-client:
    build: src-tauri
    container_name: bittorrent-client
    depends_on:
    - opentracker
    develop:
      watch:
      - action: rebuild
        path: ./src-tauri/src
      - action: rebuild
        path: ./src-tauri/Cargo.toml
      - action: rebuild
        path: ./src-tauri/Cargo.lock
    environment:
    - TORRENT_DIR=/torrents
    volumes:
    - ./docker/torrents:/torrents
    - ./docker/client/pieces:/pieces
    - ./docker/client/downloads:/downloads
  opentracker:
    container_name: opentracker
    image: wiltonsr/opentracker:open
    ports:
    - 6969:6969
    - 6969:6969/udp
    restart: unless-stopped
  qbittorrent-1:
    container_name: qbittorrent-1
    environment:
    - PUID=1000
    - PGID=1000
    - WEBUI_PORT=8080
    image: linuxserver/qbittorrent:latest
    ports:
    - 8080:8080
    - 6881:6881
    - 6881:6881/udp
    volumes:
    - ./docker/qbittorrent1/config:/config
    - ./docker/qbittorrent1/torrents:/torrents
    - ./docker/qbittorrent-base/downloads:/downloads
  qbittorrent-2:
    container_name: qbittorrent-2
    environment:
    - PUID=1000
    - PGID=1000
    - WEBUI_PORT=8081
    image: linuxserver/qbittorrent:latest
